<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whistle Shopping.com</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #FF6B00;
    --primary-dark: #e05a00;
    --primary-light: #fff3e8;
    --secondary: #1A1A2E;
    --accent: #FFD700;
    --bg: #F5F5F5;
    --white: #ffffff;
    --text: #222222;
    --text-muted: #777;
    --border: #e0e0e0;
    --success: #28a745;
    --danger: #dc3545;
    --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--secondary);
    position: sticky; top: 0; z-index: 1000;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
  }
  .header-top {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 20px; max-width: 1400px; margin: 0 auto;
  }
  .logo {
    font-family: 'Sora', sans-serif;
    font-size: 1.5rem; font-weight: 800;
    color: var(--white); white-space: nowrap; text-decoration: none;
    display: flex; align-items: center; gap: 6px;
  }
  .logo span { color: var(--primary); }
  .logo .dot { color: var(--accent); }
  .search-bar {
    flex: 1; display: flex; max-width: 700px; min-width: 0;
  }
  .search-bar select {
    padding: 0 10px; border: none; background: #ddd;
    border-radius: 8px 0 0 8px; font-size: 13px; cursor: pointer;
    font-family: 'Outfit', sans-serif; color: #333;
    display: none;
  }
  .search-bar input {
    flex: 1; padding: 10px 16px; border: none; outline: none;
    font-size: 15px; font-family: 'Outfit', sans-serif;
    border-radius: 8px 0 0 8px; min-width: 0;
  }
  .search-bar button {
    padding: 0 18px; background: var(--primary); border: none;
    cursor: pointer; border-radius: 0 8px 8px 0; transition: background .2s;
  }
  .search-bar button:hover { background: var(--primary-dark); }
  .search-bar button svg { display: block; }
  .header-actions {
    display: flex; align-items: center; gap: 8px; margin-left: auto;
  }
  .header-btn {
    background: none; border: none; color: var(--white);
    cursor: pointer; padding: 8px 10px; border-radius: 8px;
    display: flex; align-items: center; gap: 6px;
    font-family: 'Outfit', sans-serif; font-size: 13px;
    transition: background .2s; text-decoration: none;
    position: relative;
  }
  .header-btn:hover { background: rgba(255,255,255,0.12); }
  .header-btn svg { flex-shrink: 0; }
  .cart-count {
    position: absolute; top: 2px; right: 2px;
    background: var(--primary); color: white; font-size: 10px;
    font-weight: 700; border-radius: 50%; width: 17px; height: 17px;
    display: flex; align-items: center; justify-content: center;
    display: none;
  }
  .header-nav {
    background: #16162a; padding: 6px 20px;
    display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
    max-width: 100%;
  }
  .header-nav::-webkit-scrollbar { display: none; }
  .nav-link {
    color: #ccc; font-size: 13px; white-space: nowrap;
    text-decoration: none; padding: 5px 12px; border-radius: 6px;
    transition: all .2s; cursor: pointer; border: none; background: none;
    font-family: 'Outfit', sans-serif;
  }
  .nav-link:hover, .nav-link.active { color: white; background: rgba(255,107,0,0.25); }

  /* HERO BANNER */
  .hero { position: relative; overflow: hidden; }
  .hero-slides { display: flex; transition: transform .5s ease; }
  .hero-slide {
    min-width: 100%; height: 320px; position: relative;
    display: flex; align-items: center; padding: 40px;
  }
  .hero-slide:nth-child(1) { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
  .hero-slide:nth-child(2) { background: linear-gradient(135deg, #4a1942 0%, #c83660 50%, #ff6b6b 100%); }
  .hero-slide:nth-child(3) { background: linear-gradient(135deg, #0d4b3c 0%, #1b7a5a 50%, #2ecc71 100%); }
  .hero-content { z-index: 2; max-width: 500px; }
  .hero-tag {
    display: inline-block; background: var(--primary);
    color: white; font-size: 11px; font-weight: 700; letter-spacing: 1px;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 12px;
    text-transform: uppercase;
  }
  .hero-title {
    font-family: 'Sora', sans-serif; font-size: 2.2rem; font-weight: 800;
    color: white; line-height: 1.2; margin-bottom: 10px;
  }
  .hero-subtitle { color: rgba(255,255,255,0.75); font-size: 1rem; margin-bottom: 20px; }
  .hero-cta {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--primary); color: white; padding: 12px 24px;
    border-radius: 50px; font-weight: 600; text-decoration: none;
    font-size: 15px; cursor: pointer; border: none; transition: transform .2s, box-shadow .2s;
    font-family: 'Outfit', sans-serif;
  }
  .hero-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,0,0.4); }
  .hero-image {
    position: absolute; right: 40px; top: 50%;
    transform: translateY(-50%); width: 260px; height: 260px;
    display: flex; align-items: center; justify-content: center;
    font-size: 140px; filter: drop-shadow(0 10px 30px rgba(0,0,0,0.3));
  }
  .hero-dots {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 5;
  }
  .hero-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,0.4); cursor: pointer; transition: all .2s;
    border: none;
  }
  .hero-dot.active { background: white; width: 24px; border-radius: 4px; }
  .hero-prev, .hero-next {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.15); backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.2); color: white;
    width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .2s; z-index: 5; font-size: 18px;
  }
  .hero-prev { left: 16px; }
  .hero-next { right: 16px; }
  .hero-prev:hover, .hero-next:hover { background: rgba(255,255,255,0.28); }

  /* MAIN CONTENT */
  .main { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }

  /* CATEGORY STRIP */
  .categories {
    display: flex; gap: 10px; overflow-x: auto;
    padding-bottom: 4px; scrollbar-width: none; margin-bottom: 28px;
  }
  .categories::-webkit-scrollbar { display: none; }
  .cat-pill {
    display: flex; align-items: center; gap: 8px;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: 50px; padding: 8px 16px; white-space: nowrap;
    cursor: pointer; transition: all .2s; font-size: 13px; font-weight: 500;
  }
  .cat-pill:hover, .cat-pill.active {
    border-color: var(--primary); background: var(--primary-light); color: var(--primary);
  }
  .cat-pill .cat-icon { font-size: 18px; }

  /* SECTION */
  .section { margin-bottom: 32px; }
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Sora', sans-serif; font-size: 1.25rem; font-weight: 700;
  }
  .see-all {
    color: var(--primary); font-size: 13px; font-weight: 600;
    text-decoration: none; cursor: pointer;
  }

  /* PRODUCT GRID */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }
  .product-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--card-shadow); overflow: hidden;
    transition: transform .2s, box-shadow .2s; cursor: pointer;
    position: relative; display: flex; flex-direction: column;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.13); }
  .product-badge {
    position: absolute; top: 10px; left: 10px; z-index: 2;
    background: var(--danger); color: white; font-size: 10px;
    font-weight: 700; padding: 3px 8px; border-radius: 20px;
  }
  .product-badge.new { background: var(--success); }
  .product-badge.hot { background: var(--primary); }
  .wishlist-btn {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    background: white; border: none; border-radius: 50%;
    width: 32px; height: 32px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12); transition: transform .2s;
  }
  .wishlist-btn:hover { transform: scale(1.15); }
  .wishlist-btn.liked svg { fill: #e53935; stroke: #e53935; }
  .product-img {
    width: 100%; aspect-ratio: 1; object-fit: cover;
    background: #f8f8f8; display: flex; align-items: center;
    justify-content: center; font-size: 80px;
    overflow: hidden;
  }
  .product-img img { width: 100%; height: 100%; object-fit: cover; }
  .product-info { padding: 12px 14px 14px; flex: 1; display: flex; flex-direction: column; }
  .product-name {
    font-size: 13px; font-weight: 500; line-height: 1.4;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; overflow: hidden;
    margin-bottom: 6px; flex: 1;
  }
  .product-rating { display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
  .stars { color: var(--accent); font-size: 12px; }
  .rating-count { font-size: 11px; color: var(--text-muted); }
  .product-pricing { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .price { font-size: 17px; font-weight: 700; color: var(--text); }
  .price-old { font-size: 12px; color: var(--text-muted); text-decoration: line-through; }
  .discount { font-size: 11px; color: var(--success); font-weight: 600; }
  .add-cart-btn {
    width: 100%; padding: 9px; border: none;
    background: var(--primary); color: white; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background .2s, transform .1s;
    font-family: 'Outfit', sans-serif;
  }
  .add-cart-btn:hover { background: var(--primary-dark); }
  .add-cart-btn:active { transform: scale(0.97); }
  .add-cart-btn.added { background: var(--success); }

  /* DEALS BANNER */
  .deals-banner {
    background: linear-gradient(135deg, #1a1a2e, #e05a00);
    border-radius: var(--radius); padding: 24px 28px;
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
  }
  .deals-text h2 {
    font-family: 'Sora', sans-serif; font-size: 1.5rem;
    font-weight: 800; color: white;
  }
  .deals-text p { color: rgba(255,255,255,0.75); font-size: 14px; margin-top: 4px; }
  .countdown { display: flex; gap: 12px; }
  .countdown-unit { text-align: center; }
  .countdown-num {
    background: rgba(255,255,255,0.15); color: white;
    font-family: 'Sora', sans-serif; font-size: 1.6rem; font-weight: 800;
    padding: 8px 14px; border-radius: 8px; min-width: 56px;
    display: block;
  }
  .countdown-label { color: rgba(255,255,255,0.6); font-size: 10px; margin-top: 4px; }

  /* HORIZONTAL SCROLL */
  .product-scroll {
    display: flex; gap: 14px; overflow-x: auto;
    padding-bottom: 8px; scrollbar-width: none;
  }
  .product-scroll::-webkit-scrollbar { display: none; }
  .product-scroll .product-card { min-width: 190px; flex-shrink: 0; }

  /* FEATURES */
  .features {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 28px;
  }
  .feature-card {
    background: var(--white); border-radius: var(--radius-sm);
    padding: 16px; display: flex; align-items: center; gap: 12px;
    box-shadow: var(--card-shadow);
  }
  .feature-icon { font-size: 28px; flex-shrink: 0; }
  .feature-text h4 { font-size: 13px; font-weight: 600; }
  .feature-text p { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* BANNER GRID */
  .banner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 28px; }
  .mini-banner {
    border-radius: var(--radius); padding: 20px 24px;
    position: relative; overflow: hidden; min-height: 130px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .mini-banner:nth-child(1) { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .mini-banner:nth-child(2) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
  .mini-banner h3 { font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 700; color: white; }
  .mini-banner p { color: rgba(255,255,255,0.8); font-size: 12px; margin: 4px 0 12px; }
  .mini-banner .shop-btn {
    display: inline-block; background: white; padding: 6px 16px;
    border-radius: 20px; font-size: 12px; font-weight: 700;
    cursor: pointer; border: none; transition: transform .2s;
    font-family: 'Outfit', sans-serif;
  }
  .mini-banner .shop-btn:hover { transform: scale(1.05); }
  .mini-banner:nth-child(1) .shop-btn { color: #764ba2; }
  .mini-banner:nth-child(2) .shop-btn { color: #f5576c; }
  .mini-banner .banner-emoji {
    position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
    font-size: 60px; opacity: 0.25;
  }

  /* CART SIDEBAR */
  .cart-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 2000; opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  .cart-overlay.open { opacity: 1; pointer-events: all; }
  .cart-sidebar {
    position: fixed; right: -400px; top: 0; bottom: 0; width: 380px;
    background: var(--white); z-index: 2001; box-shadow: -4px 0 24px rgba(0,0,0,0.15);
    display: flex; flex-direction: column; transition: right .3s ease;
  }
  .cart-sidebar.open { right: 0; }
  .cart-header {
    padding: 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .cart-header h3 { font-family: 'Sora', sans-serif; font-size: 1.1rem; font-weight: 700; }
  .cart-close {
    background: none; border: none; cursor: pointer; padding: 6px;
    border-radius: 8px; transition: background .2s;
  }
  .cart-close:hover { background: #f0f0f0; }
  .cart-items { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .cart-item {
    display: flex; gap: 12px; align-items: center;
    padding: 12px; background: #fafafa; border-radius: var(--radius-sm);
    border: 1px solid var(--border);
  }
  .cart-item-img { font-size: 38px; flex-shrink: 0; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .cart-item-price { font-size: 14px; font-weight: 700; color: var(--primary); margin-top: 4px; }
  .cart-item-qty {
    display: flex; align-items: center; gap: 8px; margin-top: 6px;
  }
  .qty-btn {
    width: 24px; height: 24px; border: 1px solid var(--border);
    border-radius: 6px; background: white; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
  }
  .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
  .qty-val { font-size: 13px; font-weight: 600; min-width: 20px; text-align: center; }
  .remove-item {
    background: none; border: none; cursor: pointer; color: #ccc;
    padding: 4px; transition: color .2s;
  }
  .remove-item:hover { color: var(--danger); }
  .cart-footer {
    padding: 20px; border-top: 1px solid var(--border);
    background: var(--white);
  }
  .cart-total {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; font-size: 15px;
  }
  .cart-total strong { font-size: 1.2rem; color: var(--primary); }
  .checkout-btn {
    width: 100%; padding: 14px; background: var(--primary);
    color: white; border: none; border-radius: 10px; font-size: 15px;
    font-weight: 700; cursor: pointer; font-family: 'Outfit', sans-serif;
    transition: background .2s; letter-spacing: 0.5px;
  }
  .checkout-btn:hover { background: var(--primary-dark); }
  .empty-cart { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-cart .empty-icon { font-size: 60px; margin-bottom: 12px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--secondary); color: white; padding: 12px 22px;
    border-radius: 50px; font-size: 14px; font-weight: 500;
    z-index: 3000; transition: transform .3s; white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* FOOTER */
  footer {
    background: var(--secondary); color: rgba(255,255,255,0.7);
    padding: 40px 20px 20px; margin-top: 40px;
  }
  .footer-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 24px; max-width: 1400px; margin: 0 auto 28px;
  }
  .footer-col h4 { color: white; font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .footer-col a {
    display: block; color: rgba(255,255,255,0.6); font-size: 13px;
    text-decoration: none; margin-bottom: 8px; transition: color .2s; cursor: pointer;
  }
  .footer-col a:hover { color: var(--primary); }
  .footer-bottom {
    border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px;
    text-align: center; font-size: 13px; max-width: 1400px; margin: 0 auto;
  }
  .footer-logo { font-family: 'Sora', sans-serif; font-size: 1.3rem; font-weight: 800; color: white; }
  .footer-logo span { color: var(--primary); }

  /* MOBILE */
  @media (max-width: 768px) {
    .hero-image { display: none; }
    .hero-slide { padding: 24px 20px; height: 250px; }
    .hero-title { font-size: 1.5rem; }
    .search-bar select { display: none; }
    .header-btn span { display: none; }
    .banner-grid { grid-template-columns: 1fr; }
    .product-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .cart-sidebar { width: 100%; right: -100%; }
    .mini-banner .banner-emoji { font-size: 40px; }
    .header-top { padding: 8px 12px; gap: 10px; }
  }
  @media (max-width: 480px) {
    .product-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .product-img { font-size: 60px; }
    .features { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <a class="logo">🛍️ Whisele<span>Shopping</span><span class="dot">.com</span></a>
    <div class="search-bar">
      <input type="text" placeholder="Search for products, brands..." id="searchInput" oninput="filterProducts(this.value)">
      <button onclick="filterProducts(document.getElementById('searchInput').value)">
        <svg width="20" height="20" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="toggleWishlist()">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span>Wishlist</span>
      </button>
      <button class="header-btn" onclick="openCart()" style="position:relative">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        <span>Cart</span>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </div>
  <nav class="header-nav">
    <button class="nav-link active" onclick="filterCategory('all',this)">All</button>
    <button class="nav-link" onclick="filterCategory('electronics',this)">📱 Electronics</button>
    <button class="nav-link" onclick="
